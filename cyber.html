  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);

    padding-bottom: 100px; /* Space for progress bar */
  }

  /* Typography */

  .mono { font-family: 'Share Tech Mono', monospace; }

  /* Header */
  .hero { text-align: center; padding: 60px 20px 40px; border-bottom: 1px solid var(--border); }
  .hero h1 { font-size: clamp(24px, 4vw, 40px); color: #fff; text-shadow: 0 0 20px rgba(0,255,157,0.3); }
  .hero h1 span { color: var(--green); }
  .hero p { color: var(--muted); margin-top: 10px; font-size: 18px; }

  /* Container */
  .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

  /* Accordion Components */
  .phase-container { margin-bottom: 40px; border-left: 4px solid var(--cyan); border-radius: 8px; background: var(--bg2); padding: 20px; }
  .phase-header { font-size: 24px; color: #fff; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

  .month-group { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
  .month-title { 
    padding: 15px 20px; background: var(--bg3); cursor: pointer; display: flex; justify-content: space-between; 
    font-weight: 700; font-size: 18px; user-select: none; transition: background 0.2s;
  }
  .month-title:hover { background: var(--dim); }
  .month-content { display: none; padding: 20px; }
  .month-group.open .month-content { display: block; }
  .month-group.open .month-title { border-bottom: 1px solid var(--border); }

  /* Day Card - Hideable Checklist */
  .days-grid { display: flex; flex-direction: column; gap: 10px; }
  .day-card { border: 1px solid var(--border); border-radius: 6px; background: var(--bg2); overflow: hidden; transition: border-color 0.2s; }
  .day-card:hover { border-color: var(--cyan); }
  
  .day-header {
    display: flex; align-items: center; gap: 15px; padding: 12px 20px; cursor: pointer; user-select: none;
  }
  .day-header:hover { background: rgba(0, 212, 255, 0.05); }
  
  .day-label { font-size: 14px; color: var(--cyan); letter-spacing: 2px; width: 80px; flex-shrink: 0; }
  .day-preview { flex: 1; color: var(--muted); font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .day-body { display: none; padding: 20px; border-top: 1px dashed var(--border); background: var(--bg); }
  .day-card.open .day-body { display: block; }
  .day-card.open .day-preview { color: #fff; font-weight: 600; }

  .day-topic { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .day-detail { font-size: 15px; color: #8aa8c0; }

  /* Custom Checkbox */
  input[type="checkbox"] {
    appearance: none; width: 24px; height: 24px; border: 2px solid var(--muted); border-radius: 4px;
    background: transparent; cursor: pointer; position: relative; transition: all 0.2s; flex-shrink: 0;
  }
  input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
  input[type="checkbox"]:checked::after {
    content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #000; font-size: 14px; font-weight: bold;
  }
  .day-card.completed .day-label, .day-card.completed .day-preview { text-decoration: line-through; opacity: 0.5; }

  /* Progress Bar (Sticky Bottom) */
  .progress-tracker {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg3); border-top: 1px solid var(--border);
    padding: 20px 40px; display: flex; align-items: center; gap: 20px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
  }
  .progress-stats { font-family: 'Orbitron', monospace; font-size: 18px; color: var(--green); white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 12px; background: var(--bg); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green)); width: 0%; transition: width 0.4s ease; }

  @media (max-width: 600px) {
    .progress-tracker { flex-direction: column; padding: 15px; gap: 10px; }
    .day-header { padding: 12px; }
    .day-preview { display: none; } /* Hide preview on mobile to save space */
  }
</style>

// Titles mapping
const phaseTitles = {
  1: "Phase 1: Absolute Foundations", 2: "Phase 2: Exploitation Engineering",
  3: "Phase 3: RE & Advanced Analysis", 4: "Phase 4: Advanced Vulnerability Research",
  5: "Phase 5: APT Simulation & Defense", 6: "Phase 6: PhD-Level Research & Expertise"
};

// Global state tracking
let completedDays = new Set();
const totalDays = 730;

function parseData() {
  const lines = rawData.trim().split('\n');
  const tree = {};

  lines.forEach(line => {
    const [day, phase, month, topic, detail] = line.split('|');
    if (!tree[phase]) tree[phase] = { title: phaseTitles[phase], months: {} };
    if (!tree[phase].months[month]) tree[phase].months[month] = [];
    tree[phase].months[month].push({ day, topic, detail });
  });
  return tree;
}

function buildDOM(tree) {
  const container = document.getElementById('roadmap-container');
  let html = '';

  for (const phase in tree) {
    html += `<div class="phase-container">
               <h2 class="phase-header">// ${tree[phase].title}</h2>`;
    
    for (const month in tree[phase].months) {
      html += `<div class="month-group">
                 <div class="month-title" onclick="this.parentElement.classList.toggle('open')">
                   <span>MONTH ${month.padStart(2, '0')}</span> <span>▾</span>
                 </div>
                 <div class="month-content">
                   <div class="days-grid">`;
      
      tree[phase].months[month].forEach(d => {
        html += `
          <div class="day-card" id="day-card-${d.day}">
            <div class="day-header" onclick="toggleDay(${d.day})">
              <input type="checkbox" id="check-${d.day}" onclick="toggleCheck(event, ${d.day})">
              <span class="day-label mono">DAY ${d.day.padStart(3, '0')}</span>
              <span class="day-preview">${d.topic}</span>
            </div>
            <div class="day-body">
              <div class="day-topic">${d.topic}</div>
              <div class="day-detail mono">> ACTION: ${d.detail}</div>
            </div>
          </div>`;
      });
      
      html += `    </div>
                 </div>
               </div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

function toggleDay(dayId) {
  document.getElementById(`day-card-${dayId}`).classList.toggle('open');
}

function toggleCheck(event, dayId) {
  event.stopPropagation(); // Prevents the accordion from toggling when clicking the checkbox
  const card = document.getElementById(`day-card-${dayId}`);
  if (event.target.checked) {
    completedDays.add(dayId);
    card.classList.add('completed');
  } else {
    completedDays.delete(dayId);
    card.classList.remove('completed');
  }
  updateProgress();
}

function updateProgress() {
  const count = completedDays.size;
  document.getElementById('completed-count').innerText = count;
  const percentage = (count / totalDays) * 100;
  document.getElementById('progress-fill').style.width = `${percentage}%`;
}

// Initialization
document.addEventListener('DOMContentLoaded', () => {
  const tree = parseData();
  buildDOM(tree);
  // Expand first month by default
  document.querySelector('.month-group').classList.add('open');
});
</script>
